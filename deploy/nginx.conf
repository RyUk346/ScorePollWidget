# Serve the app under the subpath /hg_score_poll on location.hyperglow.co.uk.
#
# If location.hyperglow.co.uk already has a server block, DON'T use this whole
# file — just copy the two `location` blocks below into that existing block,
# then `sudo nginx -t && sudo systemctl reload nginx`. certbot manages the
# 443/SSL parts of the existing block.
#
# If this subdomain is brand new, save this file to
# /etc/nginx/sites-available/hg_score_poll, symlink it into sites-enabled,
# then run certbot to add HTTPS.

server {
    listen 80;
    server_name location.hyperglow.co.uk;

    # ---- score-poll app, served under /hg_score_poll ----
    location = /hg_score_poll {
        return 301 /hg_score_poll/;
    }

    location /hg_score_poll/ {
        alias /var/www/location/hg_score_poll/dist/;
        index index.html;
        # SPA fallback so /hg_score_poll/vote?m=... resolves to index.html
        try_files $uri $uri/ /hg_score_poll/index.html;
    }

    location /hg_score_poll/assets/ {
        alias /var/www/location/hg_score_poll/dist/assets/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
